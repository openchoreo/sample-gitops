apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: collab-svc-workload
  namespace: default
spec:
  connections:
  - component: nats
    endpoint: tcp
    envBindings:
      address: DOCLET_NATS_URL
    visibility: project
  container:
    env:
    - key: DOCLET_COLLAB_ADDR
      value: :8090
    image: host.k3d.internal:10082/doclet-collab-svc-image:v1-ba0e100a
  endpoints:
    http:
      port: 8090
      type: REST
  owner:
    componentName: collab-svc
    projectName: doclet
