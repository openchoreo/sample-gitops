apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: collab-svc-workload
  namespace: default
spec:
  container:
    env:
    - key: DOCLET_COLLAB_ADDR
      value: :8090
    image: temp-image-placeholder
  endpoints:
    http:
      type: REST
      port: 8090
  connections:
    - component: nats
      endpoint: tcp
      visibility: project
      envBindings:
        address: DOCLET_NATS_URL
  owner:
    componentName: collab-svc
    projectName: doclet
